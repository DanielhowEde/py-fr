[behave]
# Feature file locations
paths = features

# Capture settings — disabled so output appears in real-time
stdout_capture = false
stderr_capture = false
log_capture    = false

# Allure formatter — generates JSON results in allure-results/
# Run:  behave -f allure_behave.formatter:AllureFormatter -o allure-results
# Then: allure serve allure-results
format   = allure_behave.formatter:AllureFormatter
outfile  = allure-results

# Also echo the pretty formatter to the console during runs
# (comment out the two lines above and uncomment below for plain console output)
# format = pretty

# Common step glue paths — pytaf shared steps are auto-imported via features/steps
# To pick up pytaf common steps without copying them, add them to your steps/__init__.py:
#   from pytaf.common.steps import login_navigation_steps, multi_api_steps
